name: Deploy

on:
  push:
    branches: [main]

# Only one deploy running at a time per branch.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - 'docker-compose.yml'
            frontend:
              - 'frontend/**'

  deploy-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy
        if: ${{ env.RENDER_DEPLOY_HOOK != '' }}
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "Pinging Render deploy hook…"
          curl -fSs -X POST "$RENDER_DEPLOY_HOOK" >/dev/null
          echo "Triggered."

      - name: Skipped — no RENDER_DEPLOY_HOOK secret configured
        if: ${{ env.RENDER_DEPLOY_HOOK == '' }}
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          echo "::warning::RENDER_DEPLOY_HOOK secret not set — skipping backend deploy."
          echo "Add it in Settings → Secrets and variables → Actions. Get the URL from"
          echo "the Render dashboard: Service → Settings → Deploy Hook."

  deploy-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install + build
        working-directory: frontend
        env:
          VITE_API_BASE: ${{ secrets.VITE_API_BASE }}
        run: |
          npm ci
          npm run build

      - name: Deploy to Netlify
        if: ${{ env.NETLIFY_AUTH_TOKEN != '' && env.NETLIFY_SITE_ID != '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          npm install --global netlify-cli@17
          netlify deploy --prod --dir=frontend/dist --site="$NETLIFY_SITE_ID"

      - name: Skipped — Netlify credentials not configured
        if: ${{ env.NETLIFY_AUTH_TOKEN == '' || env.NETLIFY_SITE_ID == '' }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          echo "::warning::NETLIFY_AUTH_TOKEN or NETLIFY_SITE_ID secret not set — skipping frontend deploy."
          echo "Either add both secrets here, or connect the repo directly in Netlify and let it auto-deploy."
