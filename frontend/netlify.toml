[build]
  # All paths below are resolved relative to `base`, so `publish = "dist"`
  # means /opt/build/repo/frontend/dist on Netlify.
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# Backend proxy — forward /api/* and /auth/* to the Render API.
#
# WHY: splitting frontend (Netlify) and backend (Render) onto separate
# domains triggers Safari's ITP to silently drop cross-site cookies, even
# with SameSite=None+Secure. After an OAuth redirect, Safari suppresses the
# session cookie, /auth/status returns "not authenticated", the frontend
# redirects back to Strava, and the user never escapes the login loop.
# Proxying through Netlify makes every request first-party from the
# browser's POV — cookies are scoped to racingplanner.netlify.app and
# Safari treats them as first-party (stored, sent back reliably).
#
# IMPORTANT: these proxy rules must come BEFORE the SPA fallback below,
# otherwise /api/* and /auth/* would match "/*" first and return index.html.
[[redirects]]
  from = "/api/*"
  to = "https://racingplanner-api.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/auth/*"
  to = "https://racingplanner-api.onrender.com/auth/:splat"
  status = 200
  force = true

# SPA fallback — client-side router handles these routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Cache policy: hashed asset filenames (app-abc123.js) are content-addressed
# and safe to cache forever. index.html must revalidate every time so that
# the moment a new build ships, users get fresh asset hashes and don't try
# to load the previous build's chunks. Without this, a user with a tab open
# across a deploy hits "Failed to fetch dynamically imported module" when
# their router tries to load a chunk hash that no longer exists on Netlify.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
