[build]
  # All paths below are resolved relative to `base`, so `publish = "dist"`
  # means /opt/build/repo/frontend/dist on Netlify.
  base = "frontend"
  command = "npm ci && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — client-side router handles these routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
